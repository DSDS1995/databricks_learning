name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Sync to Databricks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files to DBFS
        run: |
          set -e
          
          HOST="${{ secrets.DATABRICKS_HOST }}"
          TOKEN="${{ secrets.DATABRICKS_TOKEN }}"
          
          # Clean up host
          HOST="${HOST%/}"
          if [[ ! "$HOST" =~ ^https?:// ]]; then
              HOST="https://$HOST"
          fi
          
          REPO_PATH="/Workspace/Repos/databricks_learning"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          
          echo "=== Creating/Syncing Repository ==="
          echo "Host: $HOST"
          echo "Repo URL: $REPO_URL"
          echo "Repo Path: $REPO_PATH"
          
          # Step 1: Create repository
          echo -e "\n--- Step 1: Creating repository ---"
          CREATE_RESPONSE=$(curl -s -X POST "$HOST/api/2.0/repos" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"url\": \"$REPO_URL\",
              \"provider\": \"gitHub\",
              \"path\": \"$REPO_PATH\",
              \"branch\": \"main\"
            }")
          
          echo "Response: $CREATE_RESPONSE"
          
          # Extract repo ID from response
          REPO_ID=$(echo "$CREATE_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          if [ -z "$REPO_ID" ]; then
              echo "Failed to extract repo ID, trying to get existing repo..."
              
              # Try to get existing repo
              LIST_RESPONSE=$(curl -s -X GET "$HOST/api/2.0/repos" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json")
              
              echo "Repos: $LIST_RESPONSE"
              
              REPO_ID=$(echo "$LIST_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          
          echo "Repo ID: $REPO_ID"
          
          if [ ! -z "$REPO_ID" ]; then
              # Step 2: Update repository to pull latest
              echo -e "\n--- Step 2: Updating repository ---"
              UPDATE_RESPONSE=$(curl -s -X PATCH "$HOST/api/2.0/repos/$REPO_ID" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"branch\": \"main\"
                }")
              
              echo "Update Response: $UPDATE_RESPONSE"
              echo "✓ Repository synced successfully!"
          else
              echo "✗ Could not get repo ID"
              exit 1
          fi