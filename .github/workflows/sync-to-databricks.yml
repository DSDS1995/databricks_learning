name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Sync to Databricks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files to DBFS
        run: |
          HOST="${{ secrets.DATABRICKS_HOST }}"
          TOKEN="${{ secrets.DATABRICKS_TOKEN }}"
          
          # Remove trailing slash if present
          HOST="${HOST%/}"
          
          # Add https if not present
          if [[ ! "$HOST" =~ ^https?:// ]]; then
              HOST="https://$HOST"
          fi
          
          echo "Host: $HOST"
          echo "Token: ${TOKEN:0:10}..."
          
          # Upload all files
          find . -type f ! -path './.git/*' ! -path './.github/*' | while read file; do
              # Skip binary files, only upload text files
              if file "$file" | grep -q "text"; then
                  # Read file content and encode to base64
                  CONTENT=$(base64 -w 0 < "$file")
                  
                  # Build DBFS path
                  DBFS_PATH="${file#./}"
                  DBFS_PATH="dbfs:/FileStore/databricks_learning/$DBFS_PATH"
                  
                  echo "Uploading: $DBFS_PATH"
                  
                  # Upload via REST API
                  RESPONSE=$(curl -s -X POST "$HOST/api/2.0/dbfs/put" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "{\"path\": \"$DBFS_PATH\", \"contents\": \"$CONTENT\", \"overwrite\": true}")
                  
                  echo "Status: $RESPONSE"
              fi
          done
          
          echo "Upload complete!"