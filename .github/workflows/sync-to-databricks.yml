name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Pull and sync repository files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install databricks-cli

      - name: Upload to Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Use repo name as target path
          REPO_NAME="${{ github.repository }}"
          REPO_NAME="${REPO_NAME##*/}"
          TARGET_PATH="dbfs:/FileStore/${REPO_NAME}"
          
          # Ensure target directory exists
          databricks fs mkdirs "$TARGET_PATH" 2>/dev/null || true
          
          # Upload all files recursively
          databricks fs cp --recursive --overwrite . "$TARGET_PATH/"