name: Sync Git Folder to Databricks

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    name: 'Update git folder in Databricks'
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install databricks-cli

      - name: Update git folder in Databricks
        run: |
          # Get user ID to build correct path
          USER_ID=$(databricks workspace get-status / 2>/dev/null | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2 || echo "")
          
          if [ -z "$USER_ID" ]; then
              # Use API to get user ID
              USER_RESPONSE=$(curl -s -X GET "$DATABRICKS_HOST/api/2.0/preview/scim/v2/Me" \
                -H "Authorization: Bearer $DATABRICKS_TOKEN" \
                -H "Content-Type: application/json")
              
              USER_ID=$(echo "$USER_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          
          REPO_PATH="/Repos/$USER_ID/databricks_learning"
          
          echo "User ID: $USER_ID"
          echo "Repo Path: $REPO_PATH"
          echo "Branch: main"
          
          # Try to update existing git folder
          echo "Updating git folder..."
          databricks repos update "$REPO_PATH" --branch main || {
              echo "Repo doesn't exist, creating it..."
              databricks repos create --url "https://github.com/${{ github.repository }}" \
                --provider gitHub \
                --path "$REPO_PATH" \
                --branch main
          }
          
          echo "✓ Git folder synced successfully!"