name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Sync to Databricks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files to DBFS
        run: |
          set -e
          
          HOST="${{ secrets.DATABRICKS_HOST }}"
          TOKEN="${{ secrets.DATABRICKS_TOKEN }}"
          
          # Clean up host
          HOST="${HOST%/}"
          if [[ ! "$HOST" =~ ^https?:// ]]; then
              HOST="https://$HOST"
          fi
          
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          REPO_NAME="databricks_learning"
          
          echo "=== Syncing Repository ==="
          echo "Host: $HOST"
          echo "Repo URL: $REPO_URL"
          echo "Repo Name: $REPO_NAME"
          
          # Step 1: Get current user to build path with user ID
          echo -e "\n--- Step 1: Getting current user ---"
          USER_RESPONSE=$(curl -s -X GET "$HOST/api/2.0/preview/scim/v2/Me" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json")
          
          echo "User Response: $USER_RESPONSE"
          
          USER_ID=$(echo "$USER_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          if [ -z "$USER_ID" ]; then
              echo "✗ Could not get user ID"
              exit 1
          fi
          
          echo "✓ User ID: $USER_ID"
          
          # Build repo path with user ID
          REPO_PATH="/Repos/$USER_ID/$REPO_NAME"
          echo "Repo Path: $REPO_PATH"
          
          # Step 2: Create repository
          echo -e "\n--- Step 2: Creating repository ---"
          CREATE_RESPONSE=$(curl -s -X POST "$HOST/api/2.0/repos" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"url\": \"$REPO_URL\",
              \"provider\": \"gitHub\",
              \"path\": \"$REPO_PATH\"
            }")
          
          echo "Response: $CREATE_RESPONSE"
          
          # Extract repo ID (handle both quoted and unquoted)
          REPO_ID=$(echo "$CREATE_RESPONSE" | grep -o '"id":[0-9]*' | cut -d':' -f2)
          
          if [ ! -z "$REPO_ID" ]; then
              echo "✓ Repository created with ID: $REPO_ID"
          else
              if echo "$CREATE_RESPONSE" | grep -q "RESOURCE_ALREADY_EXISTS"; then
                  echo "Repository already exists, getting ID..."
                  LIST_RESPONSE=$(curl -s -X GET "$HOST/api/2.0/repos?path_prefix=$REPO_PATH" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json")
                  
                  REPO_ID=$(echo "$LIST_RESPONSE" | grep -o '"id":[0-9]*' | cut -d':' -f2)
              fi
          fi
          
          if [ -z "$REPO_ID" ]; then
              echo "✗ Could not create or find repository"
              exit 1
          fi
          
          echo "Repo ID: $REPO_ID"
          
          # Step 3: Update repository to pull latest
          echo -e "\n--- Step 3: Pulling latest from main branch ---"
          UPDATE_RESPONSE=$(curl -s -X PATCH "$HOST/api/2.0/repos/$REPO_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"branch\": \"main\"
            }")
          
          echo "Update Response: $UPDATE_RESPONSE"
          
          if echo "$UPDATE_RESPONSE" | grep -q "error_code"; then
              echo "✗ Failed to update repository"
              exit 1
          else
              echo "✓ Repository synced successfully!"
              echo "Location: $REPO_PATH"
          fi