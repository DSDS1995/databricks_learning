name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Pull and sync repository files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: python -m pip install --upgrade pip databricks-cli

      - name: Validate Databricks secrets
        run: |
          if [ -z "${{ secrets.DATABRICKS_HOST }}" ]; then
            echo "DATABRICKS_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DATABRICKS_TOKEN }}" ]; then
            echo "DATABRICKS_TOKEN secret is not set"
            exit 1
          fi

      - name: Create Databricks CLI config
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg <<EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
          chmod 600 ~/.databrickscfg

      - name: Upload repository to DBFS
        run: |
          TARGET_PATH="${{ secrets.DATABRICKS_TARGET_PATH }}"
          if [ -z "$TARGET_PATH" ]; then
            TARGET_PATH="dbfs:/FileStore/databricks_learning"
            echo "DATABRICKS_TARGET_PATH not set, using default: $TARGET_PATH"
          fi
          
          echo "Uploading to $TARGET_PATH"
          databricks fs ls dbfs:/FileStore/ || echo "Testing connection..."
          databricks fs cp --recursive . "$TARGET_PATH" --overwrite
