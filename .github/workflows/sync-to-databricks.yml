name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Pull and sync repository files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: python -m pip install --upgrade pip databricks-cli

      - name: Upload repository to DBFS
        run: |
          TARGET_PATH="${{ secrets.DATABRICKS_TARGET_PATH }}"
          if [ -z "$TARGET_PATH" ]; then
            TARGET_PATH="dbfs:/FileStore/databricks_learning"
            echo "DATABRICKS_TARGET_PATH not set, using default free-edition DBFS path: $TARGET_PATH"
          fi

          databricks fs cp --recursive . "$TARGET_PATH"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CONFIG_FILE: /tmp/.databrickscfg
