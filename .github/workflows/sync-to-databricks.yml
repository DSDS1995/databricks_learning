name: Sync repo to Databricks

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Sync GitHub repo to Databricks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync to Databricks Repos
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python << 'EOF'
          import os
          import requests
          import json
          
          host = os.getenv('DATABRICKS_HOST', '').strip()
          token = os.getenv('DATABRICKS_TOKEN', '').strip()
          github_token = os.getenv('GITHUB_TOKEN', '').strip()
          
          if not host or not token:
              print("ERROR: DATABRICKS_HOST or DATABRICKS_TOKEN not set")
              exit(1)
          
          # Ensure host has protocol
          if not host.startswith(('http://', 'https://')):
              host = 'https://' + host
          host = host.rstrip('/')
          
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json'
          }
          
          repo_url = "${{ github.server_url }}/${{ github.repository }}"
          repo_name = "${{ github.repository }}".split('/')[-1]
          path = f"/Repos/{repo_name}"
          
          print(f"GitHub Repo: {repo_url}")
          print(f"Databricks Path: {path}")
          print(f"Host: {host}")
          
          try:
              # List existing repos
              print("\n--- Checking existing repos ---")
              response = requests.get(
                  f'{host}/api/2.0/repos',
                  headers=headers,
                  timeout=10
              )
              print(f"Response: {response.status_code}")
              
              if response.status_code == 200:
                  repos = response.json().get('repos', [])
                  print(f"Found {len(repos)} repos")
                  for repo in repos:
                      print(f"  - {repo['path']} (ID: {repo['id']})")
              else:
                  print(f"Error: {response.text}")
              
              # Try to create/update repo with GitHub token in URL
              print("\n--- Creating/Updating repo ---")
              repo_url_with_token = f"https://{github_token}@github.com/{repo_url.split('github.com/')[-1]}.git"
              
              response = requests.post(
                  f'{host}/api/2.0/repos',
                  headers=headers,
                  json={
                      'url': repo_url_with_token,
                      'provider': 'github',
                      'path': path,
                      'branch': 'main'
                  },
                  timeout=30
              )
              
              print(f"Response: {response.status_code}")
              print(f"Result: {response.text}")
              
              if response.status_code == 200 or response.status_code == 409:
                  print("✓ Repo created/already exists")
              else:
                  print(f"✗ Failed: {response.text}")
                  exit(1)
          
          except Exception as e:
              print(f"Error: {e}")
              import traceback
              traceback.print_exc()
              exit(1)
          
          EOF