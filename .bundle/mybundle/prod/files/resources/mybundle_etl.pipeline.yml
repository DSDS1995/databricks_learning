# The main pipeline for mybundle

resources:
  pipelines:
    mybundle_etl:
      name: mybundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/mybundle_etl"

      libraries:
        - glob:
            include: ../src/mybundle_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
